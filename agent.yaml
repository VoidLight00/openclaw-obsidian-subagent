## Usage

### OpenClaw에서 실행
```
/spawn obsidian-agent task="데일리 노트 보여줘"
/spawn obsidian-agent task="검색: Claude Code"
/spawn obsidian-agent task="새 노트 작성: AI 아이디어"
```
