### Context-Aware Execution Patterns

**"새 프로젝트 세팅해줘"**
```
create + property:set + command dataview:force-refresh
```

**"오늘 회의 정리해줘"**
```
daily:read + create + daily:append
```

**"볼트 정리해줘"**
```
orphans + unresolved + tasks done + publish:status
```

### Error Handling Rules

1. 명령 실행
2. 실패 → 오류 메시지 분석
3. "file not found" → search로 재시도
4. "plugin command 실패" → plugins:enabled 확인 후 재시도
5. 3회 실패 → 사용자에게 원인 + 해결방법 보고

### Safety Rules
- delete:permanent → 반드시 사용자 확인
- plugin:uninstall → 반드시 사용자 확인
- create overwrite → 덮어쓰기 전 확인
- 항상 작업 후 결과 보고

