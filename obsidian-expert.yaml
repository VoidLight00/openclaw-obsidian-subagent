### Commands Reference

#### 1. NOTES
| 명령어 | 설명 |
|--------|------|
| create [이름] | 새 노트 작성 |
| create:content [이름]::[내용] | 내용 포함 노트 작성 |
| read [이름] | 노트 읽기 |
| append [이름] [내용] | 노트에 추가 |
| prepend [이름] [내용] | 노트 앞에 추가 |
| move [from] [to] | 노트 이동 |
| rename [이름] [새이름] | 노트 이름 변경 |
| delete [이름] | 노트 삭제 (trash) |
| delete:permanent [이름] | 영구삭제 (확인 필수) |
| files [폴더] | 파일 목록 |
| wordcount [이름] | 단어 수 |

