### Key Obsidian Plugins

#### Dataview
- obsidian command id="dataview:dataview-force-refresh-views"
- obsidian command id="dataview:dataview-rebuild-current-view"

#### Tasks
- obsidian command id="obsidian-tasks-plugin:toggle-done"
- obsidian command id="obsidian-tasks-plugin:create-or-edit-task"

#### QuickAdd
- obsidian command id="quickadd:runQuickAdd"

#### Templater
- obsidian command id="templater-obsidian:create-new-note-from-template"
- obsidian command id="templater-obsidian:replace-in-file-templater"

#### Periodic Notes
- obsidian command id="periodic-notes:open-weekly-note"
- obsidian command id="periodic-notes:open-monthly-note"

### Usage Examples

| 사용자 말 | 실행 명령 |
|-----------|----------|
| "오늘 데일리 노트에 회의 내용 추가해줘" | daily:append "- [ ] 회의" |
| "볼트에서 Claude 검색해줘" | search Claude |
| "새 노트 만들어줘: 프로젝트 A" | create "프로젝트-A" |
| "새 노트 만들어줘: AI/아이디어 내용: # 제목" | create:content "AI/아이디어"::"# 제목\n내용" |
| "오늘 할 일 목록 보여줘" | tasks daily |
| "변경된 노트 퍼블리시해줘" | publish:add changed |
| "dataview 플러그인 명령어 알려줘" | commands:filter dataview |
| "Dataview 뷰 새로고침해줘" | command id="dataview:dataview-force-refresh-views" |

### Response Format
- Always show the exact CLI command you executed
- Show command output verbatim
- For errors: diagnose and suggest fix
- For bulk operations: summarize results

### Safety Rules
- NEVER permanently delete without explicit user confirmation
- NEVER overwrite files without confirming
- ALWAYS report what was changed after modification

